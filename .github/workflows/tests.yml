name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node:
          - "22"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout runtime
        uses: actions/checkout@v4
        with:
          repository: php-skir/runtime
          path: runtime

      - name: Checkout client
        uses: actions/checkout@v4
        with:
          repository: php-skir/client
          path: client

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Validate package
        run: npm run pack:dry-run

      - name: Run tests
        run: npm test
        env:
          SKIR_CLIENT_PATH: ${{ github.workspace }}/client
          SKIR_RUNTIME_PATH: ${{ github.workspace }}/runtime

  coverage:
    name: Coverage
    needs: tests
    runs-on: ubuntu-latest
    concurrency:
      group: coverage-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout runtime
        uses: actions/checkout@v4
        with:
          repository: php-skir/runtime
          path: runtime

      - name: Checkout client
        uses: actions/checkout@v4
        with:
          repository: php-skir/client
          path: client

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Measure coverage
        run: npm run test:coverage
        env:
          SKIR_CLIENT_PATH: ${{ github.workspace }}/client
          SKIR_RUNTIME_PATH: ${{ github.workspace }}/runtime

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          percentage=$(node -p 'JSON.parse(require("node:fs").readFileSync("coverage/coverage-summary.json", "utf8")).total.lines.pct')
          node .github/scripts/write-coverage-badge.mjs "$percentage" build/coverage.svg

      - name: Upload coverage badge
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: build/coverage.svg
          if-no-files-found: error
          retention-days: 1

  publish-coverage-badge:
    name: Publish coverage badge
    if: github.ref == 'refs/heads/main'
    needs: coverage
    runs-on: ubuntu-latest
    concurrency:
      group: coverage-badge
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download coverage badge
        uses: actions/download-artifact@v4
        with:
          name: coverage-badge
          path: build

      - name: Publish coverage badge
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/publish-coverage-badge.sh build/coverage.svg
