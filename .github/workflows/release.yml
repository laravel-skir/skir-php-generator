name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  verify:
    name: Verify release package
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout runtime
        uses: actions/checkout@v4
        with:
          repository: php-skir/runtime
          path: runtime

      - name: Checkout client
        uses: actions/checkout@v4
        with:
          repository: php-skir/client
          path: client

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Validate package
        run: npm run pack:dry-run

      - name: Run tests
        run: npm test
        env:
          SKIR_CLIENT_PATH: ${{ github.workspace }}/client
          SKIR_RUNTIME_PATH: ${{ github.workspace }}/runtime

      - name: Build release package
        run: npm pack --cache .npm-cache

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: skir-php-generator-*.tgz
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish to npm
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Download release package
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: package

      - name: Publish
        run: npm publish package/skir-php-generator-*.tgz --provenance --access public
